name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  backend:
    name: Backend — tests & lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8

      - name: Lint (flake8 — syntax errors only)
        run: |
          flake8 backend --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with coverage
        run: |
          pytest tests/ --cov=backend --cov-report=term-missing --cov-report=xml

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend — tests & build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --passWithNoTests
        env:
          CI: true

      - name: Production build
        run: npm run build
        env:
          CI: false

  e2e:
    name: E2E — Playwright critical path
    runs-on: ubuntu-latest
    # Non-blocking: E2E needs a live stack and can be environment-sensitive.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Set up Node 18
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install backend deps & seed DB
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python backend/seed_db.py || true

      - name: Start backend
        run: |
          nohup python backend/app.py > backend.log 2>&1 &
          for i in $(seq 1 30); do
            curl -sf http://localhost:5000/api/health && break || sleep 2;
          done
        env:
          FLASK_ENV: development

      - name: Install frontend deps & Playwright
        working-directory: frontend
        run: |
          npm ci
          npx playwright install --with-deps chromium

      - name: Run E2E (auth critical path)
        working-directory: frontend
        run: npx playwright test e2e/auth.spec.js
        env:
          CI: true
